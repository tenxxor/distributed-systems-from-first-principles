server:
  rootPath: /api/*
  applicationConnectors:
    - type: http
      port: 8080
  adminConnectors:
    - type: http
      port: 8081
  requestLog:
    appenders:
      - type: console
        layout:
          type: access-json

database:
  driverClass: org.sqlite.JDBC
  # All three containers mount the same named volume at /app/shared-data.
  # WAL mode + busy_timeout lets three JVMs share one SQLite file safely.
  url: jdbc:sqlite:/app/shared-data/counters.db
  maxSize: 1
  minSize: 1
  initialSize: 1
  properties:
    busy_timeout: "5000"

logging:
  level: INFO
  appenders:
    - type: console
      layout:
        type: json
        timestampFormat: "yyyy-MM-dd'T'HH:mm:ss.SSSXXX"
        includes: [timestamp, level, loggerName, threadName, message, mdc, exception]
        # INSTANCE_NAME is set by docker-compose.yml per container via env.
        # ${ENV:-default} is Dropwizard's syntax for "env var with default".
        additionalFields:
          instance: ${INSTANCE_NAME:-counter}
