# docker-compose.yml — challenge 12.
#
# Adds two Postgres read replicas behind the existing primary. The shared
# infrastructure is now:
#
#   postgres-primary  (writes, migrations)
#   postgres-replica-1 ┐
#   postgres-replica-2 ┴ (read-only, streaming WAL from primary)
#   redis             (unchanged from challenge 11)
#
# Counters now use TWO connection pools — one to the primary (writes),
# one to a load-balanced multi-host URL across the replicas (reads).
#
# Run:  docker compose up --build
#       docker compose down             (keeps volumes)
#       docker compose down -v          (wipes all postgres data + replicas re-bootstrap on next up)

services:
  # ─── Postgres primary ──────────────────────────────────────────────────────
  postgres-primary:
    image: postgres:16
    container_name: postgres-primary
    environment:
      POSTGRES_DB: counters
      POSTGRES_USER: counter_app
      POSTGRES_PASSWORD: change_me_in_prod
      # Trust auth from inside cluster-net is fine for a demo (the network is
      # private, the host doesn't publish 5432). Production: scram-sha-256 or
      # cert-based auth, restricted by source IP. This trust setting also
      # extends to the `replicator` role we create in primary-init.sh.
      POSTGRES_HOST_AUTH_METHOD: "trust"
    # Override startup args to enable WAL streaming for replication.
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
      # Init script runs on first boot to create the replication user.
      - ./primary-init.sh:/docker-entrypoint-initdb.d/01-create-replication-role.sh:ro
    networks:
      - cluster-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U counter_app -d counters"]
      interval: 2s
      timeout: 2s
      retries: 15
    restart: unless-stopped

  # ─── Postgres replicas (2x) ────────────────────────────────────────────────
  postgres-replica-1:
    image: postgres:16
    container_name: postgres-replica-1
    environment:
      POSTGRES_USER: counter_app           # so pg_isready healthcheck works
      POSTGRES_DB: counters
      PRIMARY_HOST: postgres-primary       # consumed by replica-entrypoint.sh
    # Override entrypoint: bootstrap from primary on first boot, then start in
    # standby mode. After the first boot, subsequent restarts skip the
    # bootstrap and just resume streaming.
    entrypoint: ["/usr/local/bin/replica-entrypoint.sh"]
    volumes:
      - pg-replica-1-data:/var/lib/postgresql/data
      - ./replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    networks:
      - cluster-net
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U counter_app -d counters"]
      interval: 2s
      timeout: 2s
      retries: 30                           # gives basebackup time to finish on first boot
    restart: unless-stopped

  postgres-replica-2:
    image: postgres:16
    container_name: postgres-replica-2
    environment:
      POSTGRES_USER: counter_app
      POSTGRES_DB: counters
      PRIMARY_HOST: postgres-primary
    entrypoint: ["/usr/local/bin/replica-entrypoint.sh"]
    volumes:
      - pg-replica-2-data:/var/lib/postgresql/data
      - ./replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    networks:
      - cluster-net
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U counter_app -d counters"]
      interval: 2s
      timeout: 2s
      retries: 30
    restart: unless-stopped

  # ─── Redis (unchanged from challenge 11) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - cluster-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
    restart: unless-stopped

  # ─── Counter instances (3 replicas, same image) ────────────────────────────
  counter-1:
    build: .
    image: counter:12
    container_name: counter-1
    environment:
      INSTANCE_NAME: counter-1
      POSTGRES_PRIMARY_HOST: postgres-primary
      POSTGRES_REPLICA_HOSTS: postgres-replica-1:5432,postgres-replica-2:5432
      POSTGRES_DB: counters
      POSTGRES_USER: counter_app
      POSTGRES_PASSWORD: change_me_in_prod
      REDIS_HOST: redis
    networks:
      - cluster-net
    ports:
      - "18081:8081"
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica-1:
        condition: service_healthy
      postgres-replica-2:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  counter-2:
    image: counter:12
    container_name: counter-2
    environment:
      INSTANCE_NAME: counter-2
      POSTGRES_PRIMARY_HOST: postgres-primary
      POSTGRES_REPLICA_HOSTS: postgres-replica-1:5432,postgres-replica-2:5432
      POSTGRES_DB: counters
      POSTGRES_USER: counter_app
      POSTGRES_PASSWORD: change_me_in_prod
      REDIS_HOST: redis
    networks:
      - cluster-net
    ports:
      - "28081:8081"
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica-1:
        condition: service_healthy
      postgres-replica-2:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  counter-3:
    image: counter:12
    container_name: counter-3
    environment:
      INSTANCE_NAME: counter-3
      POSTGRES_PRIMARY_HOST: postgres-primary
      POSTGRES_REPLICA_HOSTS: postgres-replica-1:5432,postgres-replica-2:5432
      POSTGRES_DB: counters
      POSTGRES_USER: counter_app
      POSTGRES_PASSWORD: change_me_in_prod
      REDIS_HOST: redis
    networks:
      - cluster-net
    ports:
      - "38081:8081"
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica-1:
        condition: service_healthy
      postgres-replica-2:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Load balancer (unchanged from 9.5/10/11) ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-lb
    ports:
      - "9000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cluster-net
    restart: unless-stopped
    depends_on:
      - counter-1
      - counter-2
      - counter-3

volumes:
  pg-primary-data:
  pg-replica-1-data:
  pg-replica-2-data:

networks:
  cluster-net:
    driver: bridge
