# nginx.conf — load balancer config, container-native version.
#
# Key difference from challenge 9: upstreams are addressed by SERVICE NAME
# (counter-1, counter-2, counter-3), not by port on localhost. Docker Compose
# sets up an embedded DNS server on the network that resolves each service
# name to its container's IP. If counter-2 is restarted and gets a new IP,
# nginx re-resolves on next connect — as long as the name is stable, the IP
# doesn't matter.

worker_processes 1;
error_log /var/log/nginx/error.log;

events {
    worker_connections 256;
}

http {
    access_log /var/log/nginx/access.log;

    upstream counters {
        server counter-1:8080 max_fails=3 fail_timeout=10s;
        server counter-2:8080 max_fails=3 fail_timeout=10s;
        server counter-3:8080 max_fails=3 fail_timeout=10s;
    }

    # Cache DNS resolutions briefly so a dead upstream doesn't cost a DNS
    # lookup on every request. 10s is a reasonable middle ground: long enough
    # that scaling churn doesn't blow away the cache, short enough that when
    # Docker restarts a container, nginx picks up the new IP fast.
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;

        location / {
            proxy_pass http://counters;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-Id $request_id;

            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
        }
    }
}
