# nginx.conf — the load balancer sitting in front of 3 counter instances.
#
# Run with:  nginx -c $(pwd)/nginx.conf -p $(pwd) -g 'daemon off;'
#
# `daemon off;` keeps nginx in the foreground so Ctrl-C works and logs stream to
# the terminal. `-p $(pwd)` makes nginx use this directory as its prefix for
# relative paths (logs/, temp dirs). That way we don't touch /usr/local/etc/nginx.

worker_processes 1;
error_log logs/nginx-error.log;
pid logs/nginx.pid;

events {
    worker_connections 256;
}

http {
    # nginx's own request log, one line per request it proxies through.
    access_log logs/nginx-access.log;

    # Some directories nginx insists on having, kept local to this challenge.
    client_body_temp_path logs/client_body_temp;
    proxy_temp_path       logs/proxy_temp;
    fastcgi_temp_path     logs/fastcgi_temp;
    uwsgi_temp_path       logs/uwsgi_temp;
    scgi_temp_path        logs/scgi_temp;

    # The upstream block names the pool of counter instances. nginx uses
    # round-robin by default — request 1 goes to counter-8080, request 2 to
    # counter-8082, request 3 to counter-8084, then it wraps around.
    #
    # max_fails / fail_timeout make nginx stop sending traffic to an instance
    # that's failed 3 times in 10 seconds. That's a primitive health check —
    # passive, based on request failures. A real setup would actively hit
    # /healthcheck (our admin endpoint from challenge 8) on a timer.
    upstream counters {
        server 127.0.0.1:8080 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:8082 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:8084 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 9000;

        # Tag every request with a unique ID *before* it hits the counter
        # instance. This becomes the X-Request-Id header our RequestIdFilter
        # honours, so the log line on the upstream shows the same ID that nginx
        # logged. Cross-correlation between LB log and app log without lifting
        # a finger.
        location / {
            proxy_pass http://counters;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-Id $request_id;

            # If the upstream is down or slow, try the next one. This is what
            # makes a load balancer actually useful for availability, not just
            # for throughput.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
        }
    }
}
