server:
  rootPath: /api/*
  applicationConnectors:
    - type: http
      port: 8082
  adminConnectors:
    - type: http
      port: 8083
  requestLog:
    appenders:
      - type: console
        layout:
          type: access-json

database:
  driverClass: org.sqlite.JDBC
  url: jdbc:sqlite:./shared-data/counters.db
  maxSize: 1
  minSize: 1
  initialSize: 1
  properties:
    busy_timeout: "5000"

logging:
  level: INFO
  appenders:
    - type: console
      layout:
        type: json
        timestampFormat: "yyyy-MM-dd'T'HH:mm:ss.SSSXXX"
        includes: [timestamp, level, loggerName, threadName, message, mdc, exception]
        additionalFields:
          instance: "counter-8082"
