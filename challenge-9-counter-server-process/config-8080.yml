server:
  rootPath: /api/*
  applicationConnectors:
    - type: http
      port: 8080
  adminConnectors:
    - type: http
      port: 8081
  requestLog:
    appenders:
      - type: console
        layout:
          type: access-json

database:
  driverClass: org.sqlite.JDBC
  # All three instances point to the SAME file. SQLite WAL mode allows multiple
  # processes to share it: concurrent readers, one writer at a time. busy_timeout
  # gives the waiting process up to 5s to grab the write lock before failing.
  url: jdbc:sqlite:./shared-data/counters.db
  maxSize: 1
  minSize: 1
  initialSize: 1
  properties:
    busy_timeout: "5000"

logging:
  level: INFO
  appenders:
    - type: console
      layout:
        type: json
        timestampFormat: "yyyy-MM-dd'T'HH:mm:ss.SSSXXX"
        includes: [timestamp, level, loggerName, threadName, message, mdc, exception]
        customFieldNames:
          # Tag every log line with this instance's identity so we can tell which
          # instance served which request when tailing all three log streams.
          instance: instance
        additionalFields:
          instance: "counter-8080"
